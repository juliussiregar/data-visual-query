# Jalankan: docker compose up -d
# Variabel database dibaca dari .env di root project.
# Nanti tambahkan service `app` di sini saat image siap.

services:
  db:
    image: postgres:16-alpine
    container_name: sheetvision-db
    restart: unless-stopped
    ports:
      - "0.0.0.0:${DB_PORT:-54327}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-sheetvision}
      POSTGRES_USER: ${DB_USER:-sheetvision}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_READER_PASSWORD: ${DB_READER_PASSWORD:-sheetvision_reader}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sheetvision} -d ${DB_NAME:-sheetvision}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # app:
  #   build: .
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   env_file: .env
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     DB_HOST: db
  #     DB_PORT: 5432

volumes:
  db_data:
