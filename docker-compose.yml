# SheetVision — deploy di server
#
# Project name → prefix volume/network (lihat COMPOSE_PROJECT_NAME di .env).
# Jika server SUDAH deploy: jangan ganti nama project tanpa cek `docker volume ls` dulu.
#
# Koneksi MariaDB ERP (server yang sama, app di container):
#   1. Di compose Frappe, publish MariaDB ke host:
#        ports: ["127.0.0.1:3307:3306"]
#   2. Di UI SheetVision (Sources / wizard project), isi:
#        Host: host.docker.internal   Port: 3307
#      (BUKAN 127.0.0.1 — dari dalam container, localhost = container sendiri.)
#   3. Dev laptop + SSH tunnel tetap pakai Host 127.0.0.1 Port 3307.
#
# Persiapan:
#   cp .env.example .env
#   # isi APP_SECRET, DB_PASSWORD, OPENAI_API_KEY (opsional)
#
# Build & jalankan:
#   docker compose up -d --build
#
# Deploy pertama (buat akun admin):
#   docker compose up -d --build
#   docker compose run --rm -e RUN_DB_SEED=true app true
#   # atau set RUN_DB_SEED=true di .env lalu restart app sekali
#
# Akun seed: admin / admin123, superadmin / admin123
#
# Hanya database (dev lokal tanpa container app):
#   docker compose up -d db
#   docker compose up -d analytics-db   # database IoT untuk analisis
#   docker compose up -d mysql-analytics-db   # database retail MySQL untuk analisis
#   npm run db:setup
#   npm run analytics:setup
#   npm run mysql:setup

services:
  db:
    image: postgres:16-alpine
    container_name: sheetvision-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT:-54327}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-sheetvision}
      POSTGRES_USER: ${DB_USER:-sheetvision}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-sheetvision} -d ${DB_NAME:-sheetvision}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sheetvision

  analytics-db:
    image: postgres:16-alpine
    container_name: sheetvision-analytics-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ANALYTICS_DB_PORT:-54328}:5432"
    environment:
      POSTGRES_DB: ${ANALYTICS_DB_NAME:-iot_analytics}
      POSTGRES_USER: ${ANALYTICS_DB_USER:-iot_admin}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD:?Set ANALYTICS_DB_PASSWORD in .env}
      ANALYTICS_DB_READER_USER: ${ANALYTICS_DB_READER_USER:-iot_reader}
      ANALYTICS_DB_READER_PASSWORD: ${ANALYTICS_DB_READER_PASSWORD:-iot_reader}
    volumes:
      - analytics_db_data:/var/lib/postgresql/data
      - ./docker/analytics-db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${ANALYTICS_DB_USER:-iot_admin} -d ${ANALYTICS_DB_NAME:-iot_analytics}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sheetvision

  mysql-analytics-db:
    image: mysql:8.4
    container_name: sheetvision-mysql-analytics-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MYSQL_ANALYTICS_DB_PORT:-33068}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ANALYTICS_DB_PASSWORD:?Set MYSQL_ANALYTICS_DB_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_ANALYTICS_DB_NAME:-retail_analytics}
      MYSQL_USER: ${MYSQL_ANALYTICS_DB_USER:-retail_admin}
      MYSQL_PASSWORD: ${MYSQL_ANALYTICS_DB_PASSWORD:?Set MYSQL_ANALYTICS_DB_PASSWORD in .env}
      MYSQL_ANALYTICS_DB_READER_USER: ${MYSQL_ANALYTICS_DB_READER_USER:-retail_reader}
      MYSQL_ANALYTICS_DB_READER_PASSWORD: ${MYSQL_ANALYTICS_DB_READER_PASSWORD:-retail_reader}
    volumes:
      - mysql_analytics_db_data:/var/lib/mysql
      - ./docker/mysql-analytics-db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ANALYTICS_DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s
    networks:
      - sheetvision

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sheetvision-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3066}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: "5432"
      WAIT_FOR_DB: "true"
      RUN_DB_MIGRATE: ${RUN_DB_MIGRATE:-true}
      RUN_DB_SEED: ${RUN_DB_SEED:-false}
      RUN_DB_READER_ROLE: ${RUN_DB_READER_ROLE:-true}
    depends_on:
      db:
        condition: service_healthy
    # Akses service di host (mis. MariaDB ERP di 127.0.0.1:3307) dari dalam container app.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sheetvision

volumes:
  db_data:
  analytics_db_data:
  mysql_analytics_db_data:

networks:
  # Jaringan internal SheetVision saja — tidak perlu join network Frappe jika pakai host.docker.internal.
  sheetvision:
    driver: bridge
